<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gilroy Dash Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(#182a6b, #2b4fb8);
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      padding: 14px;
      overflow-x: hidden;
    }

    .wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
      width: min(96vw, 900px);
    }

    .hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid rgba(255, 213, 74, 0.8);
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #ffd54a;
      color: #102057;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 0 #b98709;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b98709;
    }

    canvas {
      width: 100%;
      height: auto;
      max-height: 72vh;
      border: 4px solid #ffd54a;
      border-radius: 18px;
      background: #4eb3ff;
      box-shadow: 0 16px 42px rgba(0,0,0,0.35);
      touch-action: manipulation;
    }

    .message {
      min-height: 26px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff4b5;
    }

    .jump-button {
      width: min(96vw, 900px);
      padding: 18px;
      border-radius: 18px;
      font-size: 22px;
      letter-spacing: 1px;
    }

    .small {
      width: min(96vw, 900px);
      text-align: center;
      font-size: 13px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Level: <span id="level">1</span></div>
      <div>Best: <span id="best">0</span></div>
      <button id="restartBtn">Restart</button>
    </div>

    <canvas id="game" width="900" height="500" aria-label="Gilroy Geometry Dash style game"></canvas>

    <div class="message" id="message">Press Space, click, or tap to jump.</div>

    <button class="jump-button" id="jumpBtn">JUMP</button>

    <div class="small">Avoid spikes. Land on blue boxes to survive. The levels get harder quickly.</div>
  </div>

    let bestScore = Number(localStorage.getItem('gilroyDashBest') || 0);
    bestEl.textContent = bestScore;

    let state;
    let lastTime = 0;
    let obstacleTimer = 0;
    let backgroundOffset = 0;

    function makeState() {
      return {
        player: {
          x: 120,
          y: GROUND_Y - 62,
          size: 62,
          velocityY: 0,
          rotation: 0,
          onGround: true
        },
        obstacles: [],
        particles: [],
        score: 0,
        level: 1,
        speed: 5.3,
        gravity: 0.72,
        jumpPower: -15.2,
        started: false,
        gameOver: false
      };
    }

    function updateHUD() {
      scoreEl.textContent = Math.floor(state.score);
      levelEl.textContent = state.level;
      bestEl.textContent = bestScore;
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function restart() {
      state = makeState();
      obstacleTimer = 0;
      backgroundOffset = 0;
      lastTime = performance.now();
      setMessage('Press Space, click, or tap to jump.');
      updateHUD();
    }

    function jump() {
      if (state.gameOver) {
        restart();
        return;
      }

      if (!state.started) {
        state.started = true;
        setMessage('');
      }

      if (state.player.onGround) {
        state.player.velocityY = state.jumpPower;
        state.player.onGround = false;
        createDust(state.player.x + 20, GROUND_Y);
      }
    }

    function createDust(x, y) {
      for (let i = 0; i < 9; i++) {
        state.particles.push({
          x,
          y,
          vx: -Math.random() * 4 - 1,
          vy: -Math.random() * 4,
          life: 22,
          size: Math.random() * 5 + 3
        });
      }
    }

    function addObstacle() {
      const level = state.level;
      const typeRoll = Math.random();
      const startX = WIDTH + 40;

      // Higher levels create tighter, harder patterns.
      if (level >= 5 && typeRoll < 0.28) {
        // Jump onto the box, then clear the spike after it.
        const blockHeight = 66 + Math.min(34, level * 3);
        state.obstacles.push({
          type: 'block',
          x: startX,
          y: GROUND_Y - blockHeight,
          w: 72,
          h: blockHeight,
          scored: false
        });
        state.obstacles.push({
          type: 'spikes',
          x: startX + 125,
          y: GROUND_Y,
          w: 88,
          h: 56,
          count: 2,
          scored: true
        });
      } else if (level >= 3 && typeRoll < 0.5) {
        // Double or triple spike section.
        const spikeCount = level >= 6 && Math.random() < 0.45 ? 3 : 2;
        state.obstacles.push({
          type: 'spikes',
          x: startX,
          y: GROUND_Y,
          w: spikeCount * 44,
          h: 56,
          count: spikeCount,
          scored: false
        });
      } else if (typeRoll < 0.76) {
        // A platform box. You can land on top, but hitting the side still ends the game.
        const blockHeight = level >= 4 && Math.random() < 0.5 ? 92 : 62;
        const blockWidth = level >= 6 && Math.random() < 0.35 ? 104 : 64;
        state.obstacles.push({
          type: 'block',
          x: startX,
          y: GROUND_Y - blockHeight,
          w: blockWidth,
          h: blockHeight,
          scored: false
        });
      } else {
        // Single spike, used between harder patterns.
        state.obstacles.push({
          type: 'spikes',
          x: startX,
          y: GROUND_Y,
          w: 44,
          h: 54,
          count: 1,
          scored: false
        });
      }
    }

    function endGame() {
      if (state.gameOver) return;

      state.gameOver = true;
      setMessage('Game over! Press Restart or tap JUMP to play again.');

      const finalScore = Math.floor(state.score);
      if (finalScore > bestScore) {
        bestScore = finalScore;
        localStorage.setItem('gilroyDashBest', bestScore);
      }

      updateHUD();
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function playerHitbox() {
      const p = state.player;
      const padding = 11;
      return {
        x: p.x + padding,
        y: p.y + padding,
        w: p.size - padding * 2,
        h: p.size - padding * 2
      };
    }

    function triangleCollision(playerBox, spike) {
      // Forgiving collision box for spikes, so the game feels fair.
      return rectsOverlap(playerBox, {
        x: spike.x + 8,
        y: spike.y - spike.h + 16,
        w: spike.w - 16,
        h: spike.h - 16
      });
    }

    function update(delta) {
      if (!state.started || state.gameOver) return;

      const dt = delta / 16.67;
      const p = state.player;

      state.score += 0.065 * dt;
      state.level = 1 + Math.floor(state.score / 7);
      state.speed = Math.min(13.2, 6.0 + (state.level - 1) * 0.65);

      backgroundOffset -= state.speed * 0.55 * dt;
      if (backgroundOffset < -80) backgroundOffset = 0;

      const wasOnGround = p.onGround;
      const previousY = p.y;
      p.onGround = false;
      p.velocityY += state.gravity * dt;
      p.y += p.velocityY * dt;
      p.rotation += (wasOnGround ? 0 : 0.13) * dt;

      if (p.y + p.size >= GROUND_Y) {
        if (!wasOnGround && p.velocityY > 3) {
          createDust(p.x + 18, GROUND_Y);
        }
        p.y = GROUND_Y - p.size;
        p.velocityY = 0;
        p.onGround = true;
        p.rotation = 0;
      }

      obstacleTimer -= delta;
      const interval = Math.max(500, 1250 - state.level * 68);
      if (obstacleTimer <= 0) {
        addObstacle();
        obstacleTimer = interval + Math.random() * 260;
      }

      for (const obstacle of state.obstacles) {
        obstacle.x -= state.speed * dt;

        if (!obstacle.scored && obstacle.x + obstacle.w < p.x) {
          obstacle.scored = true;
          state.score += 1.5;
        }

        const box = playerHitbox();

        if (obstacle.type === 'block') {
          const previousBottom = previousY + p.size - 11;
          const currentBottom = p.y + p.size - 11;
          const horizontallyOverBlock = box.x + box.w > obstacle.x + 5 && box.x < obstacle.x + obstacle.w - 5;
          const landedOnTop = p.velocityY >= 0 && previousBottom <= obstacle.y + 8 && currentBottom >= obstacle.y && horizontallyOverBlock;

          if (landedOnTop) {
            p.y = obstacle.y - p.size + 11;
            p.velocityY = 0;
            p.onGround = true;
            p.rotation = 0;
          } else if (rectsOverlap(box, obstacle)) {
            endGame();
          }
        } else if (obstacle.type === 'spikes') {
          if (triangleCollision(box, obstacle)) {
            endGame();
          }
        }
      }

      state.obstacles = state.obstacles.filter(obstacle => obstacle.x + obstacle.w > -100);

      for (const particle of state.particles) {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 0.28 * dt;
        particle.life -= dt;
      }

      state.particles = state.particles.filter(particle => particle.life > 0);

      updateHUD();
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      sky.addColorStop(0, '#58c9ff');
      sky.addColorStop(0.55, '#6bd6ff');
      sky.addColorStop(1, '#c9f4ff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      for (let x = backgroundOffset; x < WIDTH + 120; x += 220) {
        drawCloud(x + 40, 75, 30);
        drawCloud(x + 150, 140, 24);
      }
    }

    function drawCloud(x, y, size) {
      ctx.beginPath();
      ctx.arc(x, y, size * 0.55, 0, Math.PI * 2);
      ctx.arc(x + size * 0.45, y - size * 0.25, size * 0.48, 0, Math.PI * 2);
      ctx.arc(x + size * 0.95, y, size * 0.55, 0, Math.PI * 2);
      ctx.arc(x + size * 0.45, y + size * 0.18, size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGround() {
      ctx.fillStyle = '#ffd54a';
      ctx.fillRect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);

      ctx.fillStyle = '#243b91';
      ctx.fillRect(0, GROUND_Y, WIDTH, 12);

      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      for (let x = backgroundOffset; x < WIDTH + 80; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, GROUND_Y + 12);
        ctx.lineTo(x + 20, HEIGHT);
        ctx.lineTo(x + 38, HEIGHT);
        ctx.lineTo(x + 18, GROUND_Y + 12);
        ctx.fill();
      }
    }

    function drawPlayer() {
      const p = state.player;
      ctx.save();
      ctx.translate(p.x + p.size / 2, p.y + p.size / 2);
      ctx.rotate(p.rotation);

      if (logo.complete) {
        ctx.drawImage(logo, -p.size / 2, -p.size / 2, p.size, p.size);
      } else {
        ctx.fillStyle = '#ffd54a';
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      }

      ctx.restore();
    }

    function drawSpikes(obstacle) {
      for (let i = 0; i < obstacle.count; i++) {
        const x = obstacle.x + i * 44;
        ctx.fillStyle = '#ffde59';
        ctx.beginPath();
        ctx.moveTo(x, GROUND_Y);
        ctx.lineTo(x + 22, GROUND_Y - obstacle.h);
        ctx.lineTo(x + 44, GROUND_Y);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#1c2e78';
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.fillStyle = '#fff4b0';
        ctx.beginPath();
        ctx.moveTo(x + 18, GROUND_Y - 13);
        ctx.lineTo(x + 22, GROUND_Y - obstacle.h + 10);
        ctx.lineTo(x + 27, GROUND_Y - 13);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawBlock(obstacle) {
      ctx.fillStyle = '#253b8f';
      ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

      ctx.strokeStyle = '#ffd54a';
      ctx.lineWidth = 4;
      ctx.strokeRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

      ctx.fillStyle = '#ffd54a';
      ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, 8);

      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(obstacle.x + 8, obstacle.y + 18, obstacle.w - 16, 10);
    }

    function drawObstacles() {
      for (const obstacle of state.obstacles) {
        if (obstacle.type === 'spikes') {
          drawSpikes(obstacle);
        } else {
          drawBlock(obstacle);
        }
      }
    }

    function drawParticles() {
      for (const particle of state.particles) {
        ctx.globalAlpha = Math.max(0, particle.life / 22);
        ctx.fillStyle = '#fff1a8';
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawOverlay() {
      if (!state.started && !state.gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.42)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 48px Arial';
        ctx.fillText('GILROY DASH', WIDTH / 2, 180);

        ctx.font = '22px Arial';
        ctx.fillText('Space / Click / Tap to jump', WIDTH / 2, 225);
        ctx.fillText('Land on boxes. Avoid spikes and box sides.', WIDTH / 2, 258);
      }

      if (state.gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.62)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 50px Arial';
        ctx.fillText('GAME OVER', WIDTH / 2, 180);

        ctx.font = '24px Arial';
        ctx.fillText(`Score: ${Math.floor(state.score)}`, WIDTH / 2, 225);
        ctx.fillText(`Best: ${bestScore}`, WIDTH / 2, 260);

        ctx.font = '18px Arial';
        ctx.fillText('Press Restart or tap JUMP to play again', WIDTH / 2, 305);
      }
    }

    function draw() {
      drawBackground();
      drawGround();
      drawObstacles();
      drawParticles();
      drawPlayer();
      drawOverlay();
    }

    function loop(timestamp) {
      const delta = timestamp - lastTime;
      lastTime = timestamp;

      update(delta);
      draw();

      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        jump();
      }
    }, { passive: false });

    canvas.addEventListener('click', jump);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    jumpBtn.addEventListener('click', jump);
    jumpBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    restartBtn.addEventListener('click', restart);

    restart();
    requestAnimationFrame((timestamp) => {
      lastTime = timestamp;
      loop(timestamp);
    });
  </script>
</body>
</html>
