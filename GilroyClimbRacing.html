<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gilroy Hill Climb Racing</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(#78d8ff, #dff8ff 62%, #7bd15b);
      font-family: Arial, Helvetica, sans-serif;
      color: #102033;
      padding: 14px;
    }

    .wrap {
      width: min(96vw, 920px);
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.92);
      border: 3px solid #1e4b86;
      border-radius: 18px;
      padding: 10px 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      font-size: 17px;
      font-weight: 800;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 900;
      cursor: pointer;
      background: #ffd54a;
      color: #111;
      box-shadow: 0 4px 0 #b98d17;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b98d17;
    }

    canvas {
      width: 100%;
      height: auto;
      border: 4px solid #1e4b86;
      border-radius: 20px;
      background: #8fdcff;
      box-shadow: 0 16px 40px rgba(0,0,0,.28);
      touch-action: none;
    }

    .message {
      width: 100%;
      min-height: 24px;
      text-align: center;
      font-weight: 800;
      color: #0b2d4e;
    }

    .mobile-controls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mobile-controls button {
      height: 70px;
      font-size: 20px;
      border-radius: 22px;
    }

    .small {
      text-align: center;
      font-size: 13px;
      opacity: .85;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div>Distance: <span id="distance">0</span> m</div>
      <div>Coins: <span id="coins">0</span></div>
      <div>Fuel: <span id="fuel">100</span>%</div>
      <div>Best: <span id="best">0</span> m</div>
      <button id="restartBtn">Restart</button>
    </div>

    <canvas id="game" width="920" height="520"></canvas>

    <div class="message" id="message">Use ← / → or mobile pedals. The car now gets more air off hills, but landing badly can still flip it!</div>

    <div class="mobile-controls">
      <button id="brakeBtn">BRAKE</button>
      <button id="gasBtn">GAS</button>
    </div>

    <div class="small">Goal: drive as far as possible, collect Gilroy logos and fuel cans, and do not flip over.</div>
  </div>

    const W = canvas.width;
    const H = canvas.height;
    const GROUND_BASE = 350;
    const GRAVITY = 0.50;
    const AIR_LAUNCH_BOOST = 0.72;

    let keys = {};
    let best = Number(localStorage.getItem("gilroyHillBest") || 0);
    let game;

    bestEl.textContent = best;

    function hillY(x) {
      return GROUND_BASE
        + Math.sin(x * 0.009) * 38
        + Math.sin(x * 0.021) * 22
        + Math.sin(x * 0.047) * 8;
    }

    function hillSlope(x) {
      const y1 = hillY(x - 3);
      const y2 = hillY(x + 3);
      return Math.atan2(y2 - y1, 6);
    }

    function makeItem(type, x) {
      return { type, x, y: hillY(x) - 42, collected: false };
    }

    function restart() {
      game = {
        car: {
          x: 80,
          y: hillY(80) - 34,
          vx: 0,
          vy: 0,
          angle: 0,
          angularVelocity: 0,
          grounded: false,
          width: 88,
          height: 34,
          wheelR: 15,
          flipTimer: 0
        },
        cameraX: 0,
        distance: 0,
        coins: 0,
        fuel: 100,
        gameOver: false,
        items: [],
        nextItemX: 300,
        difficulty: 1
      };

      for (let x = 280; x < 9000; x += 230 + Math.random() * 180) {
        const r = Math.random();
        if (r < 0.16) game.items.push(makeItem("fuel", x));
        else game.items.push(makeItem("coin", x));
      }

      messageEl.textContent = "Use ← / → or mobile pedals. The car now gets more air off hills, but landing badly can still flip it!";
      updateHUD();
    }

    function updateHUD() {
      distanceEl.textContent = Math.max(0, Math.floor(game.distance));
      coinsEl.textContent = game.coins;
      fuelEl.textContent = Math.max(0, Math.floor(game.fuel));
      bestEl.textContent = best;
    }

    function endGame(reason) {
      if (game.gameOver) return;
      game.gameOver = true;

      if (game.distance > best) {
        best = Math.floor(game.distance);
        localStorage.setItem("gilroyHillBest", best);
      }

      messageEl.textContent = reason + " Press Restart to try again.";
      updateHUD();
    }

    function controls() {
      const gas = keys.ArrowRight || keys.KeyD || keys.gas;
      const brake = keys.ArrowLeft || keys.KeyA || keys.brake;
      return { gas, brake };
    }

    function update() {
      if (game.gameOver) return;

      const car = game.car;
      const c = controls();
      const ground = hillY(car.x);
      const slope = hillSlope(car.x);

      game.difficulty = 1 + game.distance / 1200;

      if (c.gas && game.fuel > 0) {
        car.vx += Math.cos(slope) * 0.18;
        car.vy += Math.sin(slope) * 0.18;
        car.angularVelocity += 0.004;
        game.fuel -= 0.045 * game.difficulty;
      }

      if (c.brake) {
        car.vx *= 0.965;
        car.angularVelocity -= 0.006;
      }

      car.vy += GRAVITY;

      // Launch the car higher when it leaves a steep hill at speed.
      if (!car.grounded && Math.abs(car.vx) > 2.2 && Math.abs(slope) > 0.28) {
        car.vy -= AIR_LAUNCH_BOOST * Math.min(Math.abs(car.vx) / 6, 1);
      }

      car.x += car.vx;
      car.y += car.vy;

      car.vx *= 0.992;
      car.angularVelocity *= car.grounded ? 0.94 : 0.975;

      const groundNow = hillY(car.x);
      if (car.y + car.height / 2 > groundNow - car.wheelR) {
        car.y = groundNow - car.wheelR - car.height / 2;
        car.vy *= -0.08;
        car.vx += Math.sin(slope) * 0.08;
        car.grounded = true;

        // If the car lands upside down or heavily on its roof, it is game over.
        const normalisedAngle = Math.atan2(Math.sin(car.angle), Math.cos(car.angle));
        if (Math.abs(normalisedAngle) > 2.15) {
          endGame("You landed on your roof!");
          return;
        }

        car.angle += (slope - car.angle) * 0.28;
      } else {
        car.grounded = false;
        car.angle += car.angularVelocity;
      }

      if (car.grounded) {
        car.angle += (slope - car.angle) * 0.22;
      }

      if (Math.abs(car.angle) > 2.45) {
        car.flipTimer++;
      } else {
        car.flipTimer = 0;
      }

      if (car.flipTimer > 32) {
        endGame("You flipped!");
      }

      if (game.fuel <= 0 && Math.abs(car.vx) < 0.25) {
        endGame("Out of fuel!");
      }

      game.distance = Math.max(game.distance, car.x / 10);
      game.cameraX = car.x - 210;

      collectItems();

      if (car.y > H + 200) {
        endGame("You crashed!");
      }

      updateHUD();
    }

    function collectItems() {
      const car = game.car;

      for (const item of game.items) {
        if (item.collected) continue;

        const dx = item.x - car.x;
        const dy = item.y - car.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 48) {
          item.collected = true;

          if (item.type === "coin") {
            game.coins++;
            game.distance += 8;
            messageEl.textContent = "Coin collected!";
          } else {
            game.fuel = Math.min(100, game.fuel + 34);
            messageEl.textContent = "Fuel collected!";
          }
        }
      }
    }

    function drawSky() {
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#68ccff");
      sky.addColorStop(0.68, "#c8f3ff");
      sky.addColorStop(1, "#efffff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "rgba(255,255,255,.75)";
      for (let i = 0; i < 7; i++) {
        const x = ((i * 210 - game.cameraX * 0.25) % (W + 260)) - 120;
        const y = 60 + (i % 3) * 45;
        cloud(x, y, 30 + (i % 2) * 12);
      }

      ctx.fillStyle = "rgba(30,90,130,.16)";
      for (let x = -100; x < W + 200; x += 120) {
        const px = x - (game.cameraX * 0.12 % 120);
        ctx.beginPath();
        ctx.moveTo(px, 270);
        ctx.lineTo(px + 80, 165);
        ctx.lineTo(px + 170, 270);
        ctx.closePath();
        ctx.fill();
      }
    }

    function cloud(x, y, s) {
      ctx.beginPath();
      ctx.arc(x, y, s * .55, 0, Math.PI * 2);
      ctx.arc(x + s * .48, y - s * .25, s * .5, 0, Math.PI * 2);
      ctx.arc(x + s, y, s * .58, 0, Math.PI * 2);
      ctx.arc(x + s * .48, y + s * .2, s * .6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGround() {
      ctx.beginPath();
      ctx.moveTo(0, H);

      for (let sx = 0; sx <= W + 20; sx += 10) {
        const wx = sx + game.cameraX;
        ctx.lineTo(sx, hillY(wx));
      }

      ctx.lineTo(W, H);
      ctx.closePath();

      const dirt = ctx.createLinearGradient(0, 300, 0, H);
      dirt.addColorStop(0, "#63c943");
      dirt.addColorStop(0.08, "#2ea83c");
      dirt.addColorStop(0.09, "#9c6c33");
      dirt.addColorStop(1, "#5d351a");
      ctx.fillStyle = dirt;
      ctx.fill();

      ctx.strokeStyle = "#207e2e";
      ctx.lineWidth = 5;
      ctx.beginPath();
      for (let sx = 0; sx <= W + 20; sx += 10) {
        const wx = sx + game.cameraX;
        if (sx === 0) ctx.moveTo(sx, hillY(wx));
        else ctx.lineTo(sx, hillY(wx));
      }
      ctx.stroke();
    }

    function drawItems() {
      for (const item of game.items) {
        if (item.collected) continue;
        const sx = item.x - game.cameraX;
        if (sx < -50 || sx > W + 50) continue;

        const y = item.y;

        if (item.type === "coin") {
          ctx.save();
          ctx.beginPath();
          ctx.arc(sx, y, 17, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();

          if (logo.complete && logo.naturalWidth) {
            ctx.drawImage(logo, sx - 17, y - 17, 34, 34);
          } else {
            ctx.fillStyle = "#ffd84a";
            ctx.fillRect(sx - 17, y - 17, 34, 34);
          }

          ctx.restore();

          ctx.strokeStyle = "#a87600";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(sx, y, 17, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.fillStyle = "#e94545";
          ctx.fillRect(sx - 13, y - 17, 26, 34);
          ctx.fillStyle = "#fff";
          ctx.fillRect(sx - 8, y - 8, 16, 5);
          ctx.fillRect(sx - 3, y - 13, 6, 15);
          ctx.strokeStyle = "#7b1b1b";
          ctx.lineWidth = 3;
          ctx.strokeRect(sx - 13, y - 17, 26, 34);
        }
      }
    }

    function drawCar() {
      const car = game.car;
      const sx = car.x - game.cameraX;
      const sy = car.y;

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(car.angle);

      ctx.fillStyle = "#25458f";
      ctx.fillRect(-44, -15, 88, 30);

      ctx.fillStyle = "#ffd54a";
      ctx.beginPath();
      ctx.moveTo(-23, -15);
      ctx.lineTo(-7, -39);
      ctx.lineTo(23, -39);
      ctx.lineTo(37, -15);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "#10285c";
      ctx.lineWidth = 4;
      ctx.strokeRect(-44, -15, 88, 30);

      ctx.fillStyle = "#111";
      drawWheel(-34, 18, car.wheelR);
      drawWheel(34, 18, car.wheelR);

      ctx.save();

      // Driver portrait
      ctx.beginPath();
      ctx.arc(0, -35, 23, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();

      if (driverImg.complete && driverImg.naturalWidth) {
        ctx.drawImage(driverImg, -23, -58, 46, 46);
      } else {
        ctx.fillStyle = "#ffd54a";
        ctx.beginPath();
        ctx.arc(0, -35, 21, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();

      // Helmet-style outline around the portrait
      ctx.strokeStyle = "#10285c";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, -35, 24, 0, Math.PI * 2);
      ctx.stroke();

      // Small Gilroy logo on the side of the car
      if (logo.complete && logo.naturalWidth) {
        ctx.drawImage(logo, -18, -11, 36, 36);
      }

      ctx.restore();
    }

    function drawWheel(x, y, r) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#666";
      ctx.beginPath();
      ctx.arc(x, y, r * .52, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#ddd";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - r * .5, y);
      ctx.lineTo(x + r * .5, y);
      ctx.moveTo(x, y - r * .5);
      ctx.lineTo(x, y + r * .5);
      ctx.stroke();

      ctx.fillStyle = "#111";
    }

    function drawOverlay() {
      if (!game.gameOver) return;

      ctx.fillStyle = "rgba(0,0,0,.55)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "bold 46px Arial";
      ctx.fillText("GAME OVER", W / 2, H / 2 - 40);

      ctx.font = "bold 22px Arial";
      ctx.fillText(`Distance: ${Math.floor(game.distance)} m`, W / 2, H / 2 + 2);
      ctx.fillText(`Coins: ${game.coins}`, W / 2, H / 2 + 34);

      ctx.font = "16px Arial";
      ctx.fillText("Press Restart to play again", W / 2, H / 2 + 74);
    }

    function draw() {
      drawSky();
      drawGround();
      drawItems();
      drawCar();
      drawOverlay();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", e => {
      keys[e.code] = true;
      if (["ArrowLeft", "ArrowRight", "KeyA", "KeyD"].includes(e.code)) {
        e.preventDefault();
      }
    }, { passive: false });

    window.addEventListener("keyup", e => {
      keys[e.code] = false;
    });

    function holdButton(button, keyName) {
      button.addEventListener("pointerdown", e => {
        e.preventDefault();
        keys[keyName] = true;
        button.setPointerCapture(e.pointerId);
      });
      button.addEventListener("pointerup", () => keys[keyName] = false);
      button.addEventListener("pointercancel", () => keys[keyName] = false);
      button.addEventListener("pointerleave", () => keys[keyName] = false);
    }

    holdButton(gasBtn, "gas");
    holdButton(brakeBtn, "brake");

    restartBtn.addEventListener("click", restart);

    restart();
    loop();
  </script>
</body>
</html>
